{% extends "base.html" %}
{% block content %}

<div class="container">

    <!-- ADD ITEM -->
    <div class="card add-item-card">
        <h2>Add New Item</h2>

        <form method="POST" action="{{ url_for('index') }}" enctype="multipart/form-data">

            <div class="form-row">
                <input type="text" name="name" placeholder="Item Name" required>
                <input type="text" name="sku" placeholder="SKU">
            </div>

            <div class="form-row">
                <input type="number" name="quantity" placeholder="Quantity">
                <input type="text" name="dimensions" placeholder="Dimensions">
            </div>

            <div class="form-row">
                <input type="text" name="colorways" placeholder="Colorways">
                <input type="text" name="manufacturer" placeholder="Manufacturer">
            </div>

            <div class="form-row">
                <input type="number" step="0.01" name="cost_price" placeholder="Our Price">
                <input type="number" step="0.01" name="retail_price" placeholder="Retail Price">
            </div>

            <div class="form-row">
                <input type="file" name="image">
            </div>

            <button type="submit" class="primary-btn">Add Item</button>
        </form>
    </div>

    <!-- SEARCH -->
    <div class="card">
        <input
            type="text"
            id="searchInput"
            placeholder="Search items..."
            onkeyup="filterItems()"
        >
    </div>

   <!-- ITEM GRID -->
<div class="item-grid">
{% for item in items %}

<div class="item-card" onclick="openItemModal({{ item.id }})">

<h3>{{ item.name }}</h3>
<p>SKU: {{ item.sku }}</p>
<input
type="number"
value="{{ item.quantity }}"
class="preview-qty"
onclick="event.stopPropagation()"
onchange="updatePreviewQty({{ item.id }}, this.value)"
>

</div>

{% endfor %}
</div>

<!-- ITEM MODAL -->
<div id="itemModal" class="modal" style="display:none;">
  <div class="modal-card">

    <button class="close-btn" onclick="closeItemModal()">✕</button>

    <div class="modal-grid">

      <!-- LEFT SIDE -->
      <div class="modal-left">
        <img id="modalImage" src="" alt="Item Image">
        <img id="modalBarcode" src="" alt="Barcode">
      </div>

      <!-- RIGHT SIDE -->
      <div class="modal-right">

        <h2 id="modalName"></h2>

        <p><strong>SKU:</strong> <span id="modalSku"></span></p>

        <p><strong>Manufacturer:</strong> <span id="modalManufacturer"></span></p>

        <p><strong>Weight:</strong> <span id="modalWeight"></span></p>

        <p><strong>Dimensions:</strong> <span id="modalDimensions"></span></p>

        <p><strong>Colorways:</strong> <span id="modalColors"></span></p>

        <div class="quantity-section">

          <strong>Quantity</strong>

          <div class="qty-controls">

            <button onclick="adjustQty(-1)">−</button>

            <input
              type="number"
              id="modalQtyInput"
              min="0"
              onchange="setQuantity()"
            >

            <button onclick="adjustQty(1)">+</button>

          </div>

        </div>

        <div class="modal-actions">

          <a id="orderLink" class="secondary-btn" target="_blank">
            Order Item
          </a>

       <button
            type="button"
            class="primary-btn"
            id="generateLabelBtn">
            Export Label
        </button>

        </div>

      </div>

    </div>
  </div>
</div>

<script>

let currentItemId = null


function openItemModal(id){

fetch(`/item/${id}`)
.then(res=>res.json())
.then(data=>{

currentItemId=data.id

document.getElementById("itemModal").style.display="flex"

document.getElementById("modalName").innerText=data.name
document.getElementById("modalSku").innerText=data.sku
document.getElementById("modalManufacturer").innerText=data.manufacturer
document.getElementById("modalWeight").innerText=data.weight
document.getElementById("modalDimensions").innerText=data.dimensions
document.getElementById("modalColors").innerText=data.colorways

document.getElementById("modalQtyInput").value=data.quantity

document.getElementById("modalImage").src=data.image_url
document.getElementById("modalBarcode").src=data.barcode_url

document.getElementById("orderLink").href=data.order_link

document.getElementById("generateLabelBtn").onclick=function(){
window.location.href=`/generate-label/${data.id}`
}

})

}


function adjustQty(change){

fetch(`/adjust-quantity/${currentItemId}`,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({change:change})
})
.then(res=>res.json())
.then(data=>{
document.getElementById("modalQtyInput").value=data.new_quantity
})

}


function setQuantity(){

let newQty=document.getElementById("modalQtyInput").value

fetch(`/set-quantity/${currentItemId}`,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({quantity:newQty})
})

}


function updatePreviewQty(id,qty){

fetch(`/set-quantity/${id}`,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({quantity:qty})
})

}


function closeItemModal(){
document.getElementById("itemModal").style.display="none"
}

</script>
{% endblock %}
