{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}

<div style="max-width:400px; margin:0 auto;">

  <div class="card">

    <h2>Login</h2>

    <form method="POST">

      <div class="form-row">
        <input
          type="text"
          name="username"
          placeholder="Username"
          required
          autocomplete="username"
          autofocus
          spellcheck="false"
          autocapitalize="none"
          autocorrect="off"
        >
      </div>

      <div class="form-row">
        <input
          type="password"
          name="password"
          placeholder="Password"
          required
          autocomplete="current-password"
        >
      </div>

      <button type="submit" class="primary-btn">
        Log In
      </button>

    </form>

  </div>

</div>

{% endblock %}
