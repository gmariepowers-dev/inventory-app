{% extends "base.html" %}
{% block content %}

<div class="card">
  <h2>Something went wrong</h2>

  <p class="muted-text">
    We ran into an unexpected error. Please try again or return to the dashboard.
  </p>

  <div style="margin-top:16px; display:flex; gap:10px;">
    <a href="/" class="primary-btn">Go Home</a>
    <button onclick="location.reload()" class="secondary-btn">
      Try Again
    </button>
  </div>
</div>

{% endblock %}
