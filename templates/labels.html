{% extends "base.html" %}

{% block content %}

<h2>Label Preview</h2>

<div class="labels-grid">
  {% for item in items %}
  <div class="label-card">
    <img src="{{ item.barcode_path }}" alt="Barcode for {{ item.name }}">
    <h4>{{ item.name }}</h4>
    <p>SKU: {{ item.sku }}</p>
    <p>Price: ${{ "%.2f"|format(item.price) }}</p>
    <p>Quantity: {{ item.quantity }}</p>
  </div>
  {% endfor %}
</div>

<div class="label-actions">
  <a href="{{ url_for('index') }}" class="secondary-btn">Back to Inventory</a>
  <button onclick="window.print()" class="primary-btn">Export / Print Labels</button>
</div>

{% endblock %}
